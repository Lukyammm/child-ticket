<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Casa da Gestante - Controle de Dietas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0f172a;
  --paper: #f8fafc;
  --card: #ffffff;
  --line: #e2e8f0;
  --mut: #64748b;
  --pri: #059669;
  --pri-d: #047857;
  --pri-s: #d1fae5;
  --danger: #ef4444;
  --danger-s: #fee2e2;
  --r: 16px;
  --r-sm: 8px;
  --sh: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
  --sh-lift: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
  --body: 'Outfit', system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: var(--body); 
  background: var(--paper); 
  color: var(--ink); 
  font-size: 15px; 
  line-height: 1.5; 
  min-height: 100vh; 
  -webkit-font-smoothing: antialiased;
}

/* Typography Utilities */
h1, h2, h3, h4 { color: var(--ink); font-weight: 600; letter-spacing: -0.02em; }

/* Topbar */
.topbar { 
  position: sticky; 
  top: 0; 
  z-index: 40; 
  background: rgba(255, 255, 255, 0.85); 
  backdrop-filter: blur(12px); 
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line); 
}
.topbar .in { 
  max-width: 1400px; 
  margin: 0 auto; 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
  padding: 16px 24px; 
  flex-wrap: wrap; 
  gap: 16px; 
}
.brand { 
  display: flex; 
  align-items: center; 
  gap: 14px; 
  text-decoration: none; 
  color: inherit; 
  transition: opacity 0.2s;
}
.brand:hover { opacity: 0.8; }
.brand .dot { 
  width: 42px; 
  height: 42px; 
  background: var(--pri-s); 
  color: var(--pri); 
  border-radius: 12px; 
  display: grid; 
  place-items: center; 
}
.brand b { font-weight: 700; font-size: 20px; line-height: 1.1; }
.brand small { display: block; color: var(--mut); font-size: 12px; letter-spacing: .08em; text-transform: uppercase; font-weight: 600; margin-top: 2px; }

.top-actions { display: flex; align-items: center; gap: 16px; }
.date-selector { 
  padding: 10px 16px; 
  border: 1px solid var(--line); 
  border-radius: var(--r-sm); 
  background: var(--paper); 
  font-family: inherit; 
  font-size: 15px; 
  font-weight: 600; 
  color: var(--ink); 
  cursor: pointer; 
  outline: none; 
  transition: all 0.2s;
}
.date-selector:hover { border-color: #cbd5e1; background: #fff; }
.date-selector:focus { border-color: var(--pri); box-shadow: 0 0 0 3px rgba(5,150,105,.15); background: #fff; }

.btn { 
  padding: 10px 20px; 
  border-radius: var(--r-sm); 
  font-size: 15px; 
  font-weight: 600; 
  border: 1px solid var(--line); 
  background: #fff; 
  color: var(--ink);
  cursor: pointer; 
  transition: all 0.2s ease; 
  display: inline-flex; 
  align-items: center; 
  justify-content: center; 
  gap: 8px;
}
.btn:hover { background: var(--paper); border-color: #cbd5e1; }
.btn.primary { background: var(--pri); color: #fff; border-color: var(--pri); box-shadow: 0 4px 12px rgba(5,150,105,0.25); }
.btn.primary:hover { background: var(--pri-d); transform: translateY(-1px); box-shadow: 0 6px 14px rgba(5,150,105,0.3); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

/* Layout & Table */
main { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }
.card { 
  background: var(--card); 
  border: 1px solid var(--line); 
  border-radius: var(--r); 
  box-shadow: var(--sh); 
  overflow: hidden; 
  animation: fadeUp 0.4s ease-out forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: none; }
}

.card-header { 
  padding: 20px 24px; 
  border-bottom: 1px solid var(--line); 
  background: var(--card); 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
}
.card-header h2 { font-size: 20px; }

.tbl-wrap { overflow-x: auto; }
.tbl { width: 100%; border-collapse: separate; border-spacing: 0; text-align: left; }
.tbl th { 
  font-size: 12px; 
  letter-spacing: .05em; 
  text-transform: uppercase; 
  color: var(--mut); 
  font-weight: 600;
  padding: 16px 24px; 
  border-bottom: 1px solid var(--line); 
  background: var(--paper); 
}
.tbl td { 
  padding: 16px 24px; 
  border-bottom: 1px solid var(--line); 
  vertical-align: top; 
  transition: background 0.2s;
}
.tbl tbody tr { transition: transform 0.15s, box-shadow 0.15s; }
.tbl tbody tr:hover td { background: var(--paper); }
.tbl tbody tr:last-child td { border-bottom: none; }

.paciente-nome { font-weight: 700; color: var(--ink); font-size: 16px; margin-bottom: 4px; line-height: 1.3; }
.paciente-diag { font-size: 13.5px; color: var(--mut); font-weight: 500; }
.dieta-badge { 
  display: inline-flex; 
  align-items: center;
  background: var(--pri-s); 
  color: var(--pri-d); 
  padding: 6px 10px; 
  border-radius: 8px; 
  font-size: 13px; 
  font-weight: 600; 
  border: 1px solid rgba(5,150,105,0.1);
}

.meal-btn { 
  background: #fff; 
  border: 1px solid var(--line); 
  color: var(--mut); 
  padding: 8px 12px; 
  border-radius: var(--r-sm); 
  font-size: 13px; 
  font-weight: 500; 
  cursor: pointer; 
  transition: all 0.2s ease; 
  display: block; 
  width: 100%; 
  text-align: left; 
  margin-bottom: 6px; 
  font-family: inherit;
}
.meal-btn:hover { 
  border-color: var(--pri); 
  color: var(--pri-d); 
  background: var(--pri-s); 
  transform: translateX(2px);
}
.meal-btn:last-child { margin-bottom: 0; }

.edit-btn { 
  background: none; 
  border: none; 
  color: var(--pri); 
  font-size: 13px; 
  font-weight: 600; 
  cursor: pointer; 
  transition: color 0.2s; 
  margin-top: 10px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.edit-btn:hover { color: var(--pri-d); text-decoration: underline; }

/* Modal */
.overlay { 
  position: fixed; 
  inset: 0; 
  background: rgba(15, 23, 42, 0.6); 
  backdrop-filter: blur(4px);
  z-index: 60; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  padding: 20px; 
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.overlay.open { opacity: 1; pointer-events: auto; }

.modal { 
  background: #fff; 
  border-radius: 20px; 
  width: 100%; 
  max-width: 540px; 
  box-shadow: var(--sh-lift); 
  overflow: hidden; 
  transform: scale(0.95) translateY(10px);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex;
  flex-direction: column;
  max-height: 90vh;
}
.overlay.open .modal { transform: scale(1) translateY(0); }

.modal-header { 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
  padding: 20px 24px; 
  border-bottom: 1px solid var(--line); 
  background: #fff;
  z-index: 2;
}
.modal-header h3 { font-size: 18px; }
.xbtn { 
  background: var(--paper); 
  border: none; 
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; 
  color: var(--mut); 
  cursor: pointer; 
  transition: all 0.2s;
}
.xbtn:hover { background: #e2e8f0; color: var(--ink); }

.modal-body { 
  padding: 24px; 
  overflow-y: auto; 
  flex: 1;
}
.modal-footer { 
  padding: 20px 24px; 
  border-top: 1px solid var(--line); 
  display: flex; 
  gap: 12px; 
  justify-content: flex-end; 
  background: var(--paper);
}

/* Forms */
.field { margin-bottom: 18px; }
.field label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; color: #334155; }
.field input, .field select, .field textarea { 
  width: 100%; 
  border: 1px solid var(--line); 
  border-radius: 10px; 
  padding: 12px 16px; 
  background: #fff; 
  font-family: inherit; 
  font-size: 15px; 
  color: var(--ink);
  outline: none; 
  transition: all 0.2s; 
  box-shadow: 0 1px 2px rgba(0,0,0,0.02) inset;
}
.field input::placeholder, .field textarea::placeholder { color: #94a3b8; }
.field input:focus, .field select:focus, .field textarea:focus { 
  border-color: var(--pri); 
  box-shadow: 0 0 0 4px rgba(5,150,105,.1); 
}
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }

/* Label Preview (Screen) */
.label-preview-wrapper { 
  background: var(--paper); 
  padding: 30px; 
  display: flex; 
  justify-content: center; 
  border-bottom: 1px solid var(--line);
}
.label-preview { 
  width: 104mm; 
  height: 56mm; 
  background: #fff; 
  border: 1px solid #cbd5e1; 
  box-shadow: var(--sh-lift); 
  padding: 6mm; 
  box-sizing: border-box; 
  display: flex; 
  flex-direction: column; 
  justify-content: center; 
  font-family: 'Inter', Arial, sans-serif; 
  color: #000; 
  border-radius: 4px;
}
.label-header { 
  display: flex; 
  justify-content: space-between; 
  font-size: 13px; 
  font-weight: 700; 
  margin-bottom: 10px; 
  text-transform: uppercase; 
  color: #333;
  border-bottom: 2px solid #000;
  padding-bottom: 4px;
}
.label-paciente { font-size: 16px; font-weight: 800; margin-bottom: 8px; line-height: 1.3; }
.label-refeicao { font-size: 18px; font-weight: 800; margin-bottom: 6px; text-transform: uppercase; background: #000; color: #fff; padding: 4px 8px; display: inline-block; width: fit-content; }
.label-dieta { font-size: 15px; font-weight: 700; border: 1px dashed #000; padding: 4px 8px; display: inline-block; width: fit-content; }

/* Toasts */
#toasts { position: fixed; left: 50%; transform: translateX(-50%); bottom: 24px; z-index: 100; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
.toast { 
  background: var(--ink); 
  color: #fff; 
  border-radius: 10px; 
  padding: 14px 24px; 
  font-size: 15px; 
  font-weight: 600; 
  box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2); 
  animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; 
  display: flex;
  align-items: center;
  gap: 10px;
}
@keyframes toastIn { from { transform: translateY(20px) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
.toast.success { background: var(--pri); }
.toast.error { background: var(--danger); }

.loader { text-align: center; padding: 60px 20px; color: var(--mut); font-weight: 500; font-size: 16px; }

/* Print Styles */
@media print {
  @page { size: 104mm 56mm; margin: 0; }
  body * { visibility: hidden; }
  .label-preview, .label-preview * { visibility: visible; }
  .label-preview { 
    position: absolute; 
    left: 0; 
    top: 0; 
    width: 104mm; 
    height: 56mm; 
    border: none !important; 
    box-shadow: none !important; 
    padding: 4mm 6mm !important; 
    margin: 0 !important; 
    background: #fff !important; 
    justify-content: center; 
    border-radius: 0 !important;
  }
  .label-header { font-size: 12pt; margin-bottom: 6pt; border-bottom: 2pt solid #000; padding-bottom: 4pt; }
  .label-paciente { font-size: 14pt; margin-bottom: 6pt; line-height: 1.2; }
  .label-refeicao { font-size: 16pt; margin-bottom: 4pt; background: #000 !important; color: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .label-dieta { font-size: 14pt; border: 1pt dashed #000 !important; }
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
</style>
</head>
<body>

<header class="topbar">
  <div class="in">
    <a class="brand" href="#">
      <span class="dot">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
      </span>
      <div>
        <b>Casa da Gestante</b>
        <small>Controle de Dietas</small>
      </div>
    </a>
    <div class="top-actions">
      <select id="date-select" class="date-selector" onchange="onDateChange()">
        <option value="">Carregando datas...</option>
      </select>
      <button class="btn primary" onclick="openFormModal()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Adicionar Paciente
      </button>
    </div>
  </div>
</header>

<main>
  <div class="card">
    <div class="card-header">
      <h2 id="table-title">Pacientes do Dia</h2>
    </div>
    <div class="tbl-wrap">
      <table class="tbl">
        <thead>
          <tr>
            <th>Paciente / Diagnóstico</th>
            <th>Dieta</th>
            <th>Desjejum (6h)</th>
            <th>Colação (9h)</th>
            <th>Almoço (12h)</th>
            <th>Lanche (15h)</th>
            <th>Jantar (18h)</th>
            <th>Ceia (21h)</th>
          </tr>
        </thead>
        <tbody id="tb-pacientes">
          <tr><td colspan="8" class="loader">Carregando dados...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Toasts -->
<div id="toasts"></div>

<!-- Modal de Impressão -->
<div class="overlay" id="modal-print">
  <div class="modal" style="max-width: 500px;">
    <div class="modal-header">
      <h3>Visualização da Etiqueta</h3>
      <button class="xbtn" onclick="closeModal('modal-print')" aria-label="Fechar">×</button>
    </div>
    <div class="label-preview-wrapper">
      <div class="label-preview" id="print-area">
        <div class="label-header">
          <span>Casa da Gestante</span>
          <span id="lbl-data"></span>
        </div>
        <div class="label-paciente" id="lbl-paciente"></div>
        <div class="label-refeicao" id="lbl-refeicao"></div>
        <div class="label-dieta" id="lbl-dieta"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-print')">Cancelar</button>
      <button class="btn primary" onclick="window.print()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
        Imprimir Etiqueta
      </button>
    </div>
  </div>
</div>

<!-- Modal de Formulário -->
<div class="overlay" id="modal-form">
  <div class="modal">
    <div class="modal-header">
      <h3 id="form-title">Adicionar Paciente</h3>
      <button class="xbtn" onclick="closeModal('modal-form')" aria-label="Fechar">×</button>
    </div>
    <div class="modal-body">
      <form id="paciente-form" onsubmit="salvarPacienteForm(event)">
        <input type="hidden" id="f-id">
        <div class="field">
          <label>Prontuário / Nome do Paciente</label>
          <input type="text" id="f-nome" required placeholder="Ex: 32083 - Antonia de Araujo Silva">
        </div>
        <div class="grid2">
          <div class="field">
            <label>Diagnóstico</label>
            <input type="text" id="f-diag" placeholder="Ex: Puérpera">
          </div>
          <div class="field">
            <label>Dieta</label>
            <input type="text" id="f-dieta" required placeholder="Ex: Geral HAS DM">
          </div>
        </div>
        
        <div style="display: flex; align-items: center; gap: 12px; margin: 24px 0 16px;">
          <div style="flex: 1; height: 1px; background: var(--line);"></div>
          <span style="font-weight:700; color: var(--mut); font-size:12px; letter-spacing: 0.05em; text-transform:uppercase;">Refeições do Dia</span>
          <div style="flex: 1; height: 1px; background: var(--line);"></div>
        </div>

        <div class="grid2">
          <div class="field">
            <label>Desjejum (6h)</label>
            <input type="text" id="f-desjejum" placeholder="Detalhes da refeição">
          </div>
          <div class="field">
            <label>Colação (9h)</label>
            <input type="text" id="f-colacao" placeholder="Detalhes da refeição">
          </div>
          <div class="field">
            <label>Almoço (12h)</label>
            <input type="text" id="f-almoco" placeholder="Detalhes da refeição">
          </div>
          <div class="field">
            <label>Lanche (15h)</label>
            <input type="text" id="f-lanche" placeholder="Detalhes da refeição">
          </div>
          <div class="field">
            <label>Jantar (18h)</label>
            <input type="text" id="f-jantar" placeholder="Detalhes da refeição">
          </div>
          <div class="field">
            <label>Ceia (21h)</label>
            <input type="text" id="f-ceia" placeholder="Detalhes da refeição">
          </div>
        </div>
        <div class="field">
          <label>Observação</label>
          <textarea id="f-obs" placeholder="Observações adicionais (opcional)" style="min-height:80px; resize: vertical;"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn" onclick="closeModal('modal-form')">Cancelar</button>
      <button type="submit" form="paciente-form" class="btn primary" id="btn-salvar">
        Salvar Paciente
      </button>
    </div>
  </div>
</div>

<script>
  let dataPacientes = [];
  let currentDate = "";

  function getDataAtual() {
    const data = new Date();
    const dia = String(data.getDate()).padStart(2, '0');
    const mes = String(data.getMonth() + 1).padStart(2, '0');
    const ano = data.getFullYear();
    return `${dia}/${mes}/${ano}`;
  }

  function showToast(msg, type='success') {
    const c = document.getElementById('toasts');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    
    let icon = type === 'success' 
      ? `<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`
      : `<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;
      
    t.innerHTML = `${icon} <span>${msg}</span>`;
    c.appendChild(t);
    setTimeout(() => { 
      t.style.opacity = '0'; 
      t.style.transform = 'translateY(10px) scale(0.95)';
      setTimeout(() => t.remove(), 300); 
    }, 4000);
  }

  document.addEventListener("DOMContentLoaded", () => {
    loadDates();
    
    // Close modal on overlay click
    document.querySelectorAll('.overlay').forEach(overlay => {
      overlay.addEventListener('mousedown', (e) => {
        if (e.target === overlay) {
          closeModal(overlay.id);
        }
      });
    });
  });

  function loadDates() {
    if (typeof google !== 'undefined') {
      google.script.run.withSuccessHandler(renderDates).getDatasDisponiveis();
    } else {
      setTimeout(() => renderDates(['17/07/2026', '18/07/2026']), 300);
    }
  }

  function renderDates(dates) {
    const sel = document.getElementById("date-select");
    sel.innerHTML = "";
    
    const hoje = getDataAtual();
    if (!dates.includes(hoje)) dates.push(hoje);
    
    dates.forEach(d => {
      const opt = document.createElement("option");
      opt.value = d;
      opt.innerText = d;
      sel.appendChild(opt);
    });
    
    sel.value = hoje;
    onDateChange();
  }

  function onDateChange() {
    currentDate = document.getElementById("date-select").value;
    document.getElementById("table-title").innerText = `Pacientes do Dia: ${currentDate}`;
    
    const tbody = document.getElementById("tb-pacientes");
    tbody.innerHTML = "<tr><td colspan='8' class='loader'>Buscando pacientes...</td></tr>";

    if (typeof google !== 'undefined') {
      google.script.run.withSuccessHandler(renderTable).getPacientesPorData(currentDate);
    } else {
      setTimeout(() => {
        renderTable([
          { id: 1, prontuario_nome: "21768 - Maria Evilene Menezes Oliveira", diagnostico: "Puerpera", dieta: "Geral", desjejum: "CAFE COMPLETO + 1 OVO", colacao: "SUCO + BISCOITO", almoco: "GERAL COM FRANGO", lanche: "VITAMINA + BISCOITO", jantar: "BRANDA DE FRANGO", ceia: "MINGAU", observacao: "" },
          { id: 2, prontuario_nome: "32083 - Antonia de Araujo Silva", diagnostico: "Puérpera", dieta: "Geral HAS DM", desjejum: "CAFÉ COMPLETO DM", colacao: "SUCO DM", almoco: "GERAL HAS DM", lanche: "VITAMINA DM", jantar: "BRANDA DM HAS", ceia: "MINGAU DM + 1 FRUTA", observacao: "" }
        ]);
      }, 500);
    }
  }

  function renderTable(pacientes) {
    dataPacientes = pacientes;
    const tbody = document.getElementById("tb-pacientes");
    tbody.innerHTML = "";

    if (pacientes.length === 0) {
      tbody.innerHTML = "<tr><td colspan='8' class='loader'>Nenhum paciente encontrado para esta data. Adicione um novo!</td></tr>";
      return;
    }

    pacientes.forEach((p, index) => {
      const tr = document.createElement("tr");
      
      const tdInfo = document.createElement("td");
      tdInfo.innerHTML = `
        <div class="paciente-nome">${p.prontuario_nome}</div>
        <div class="paciente-diag">${p.diagnostico}</div>
        <button class="edit-btn" onclick="openFormModal(${index})">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
          Editar paciente
        </button>
      `;
      
      const tdDieta = document.createElement("td");
      tdDieta.innerHTML = `<span class="dieta-badge">${p.dieta}</span>`;

      const renderMealBtn = (mealVal, mealName) => {
        if (!mealVal) return '<span style="color:var(--line); padding: 8px 12px; display:block;">—</span>';
        return `<button class="meal-btn" onclick="openPrintModal(${index}, '${mealName}')" title="Imprimir etiqueta: ${mealVal}">${mealVal}</button>`;
      };

      tr.appendChild(tdInfo);
      tr.appendChild(tdDieta);
      tr.innerHTML += `
        <td>${renderMealBtn(p.desjejum, 'Desjejum 6H')}</td>
        <td>${renderMealBtn(p.colacao, 'Colação 9H')}</td>
        <td>${renderMealBtn(p.almoco, 'Almoço 12H')}</td>
        <td>${renderMealBtn(p.lanche, 'Lanche 15H')}</td>
        <td>${renderMealBtn(p.jantar, 'Jantar 18H')}</td>
        <td>${renderMealBtn(p.ceia, 'Ceia 21H')}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  // === Modal Print ===
  function openPrintModal(index, mealName) {
    const p = dataPacientes[index];
    document.getElementById("lbl-data").innerText = currentDate;
    const pacienteStr = p.prontuario_nome.includes("-") 
      ? `Paciente: ${p.prontuario_nome.split('-')[0].trim()} - ${p.prontuario_nome.split('-').slice(1).join('-').trim()}` 
      : `Paciente: ${p.prontuario_nome}`;
    
    document.getElementById("lbl-paciente").innerText = pacienteStr;
    document.getElementById("lbl-refeicao").innerText = mealName;
    document.getElementById("lbl-dieta").innerText = p.dieta.toUpperCase();

    document.getElementById("modal-print").classList.add("open");
  }

  // === Modal Form ===
  function openFormModal(index = null) {
    const form = document.getElementById("paciente-form");
    form.reset();
    document.getElementById("f-id").value = "";

    if (index !== null) {
      document.getElementById("form-title").innerText = "Editar Paciente";
      const p = dataPacientes[index];
      document.getElementById("f-id").value = p.id;
      document.getElementById("f-nome").value = p.prontuario_nome;
      document.getElementById("f-diag").value = p.diagnostico;
      document.getElementById("f-dieta").value = p.dieta;
      document.getElementById("f-desjejum").value = p.desjejum;
      document.getElementById("f-colacao").value = p.colacao;
      document.getElementById("f-almoco").value = p.almoco;
      document.getElementById("f-lanche").value = p.lanche;
      document.getElementById("f-jantar").value = p.jantar;
      document.getElementById("f-ceia").value = p.ceia;
      document.getElementById("f-obs").value = p.observacao;
    } else {
      document.getElementById("form-title").innerText = "Adicionar Paciente";
    }

    document.getElementById("modal-form").classList.add("open");
    setTimeout(() => {
      document.getElementById("f-nome").focus();
    }, 100);
  }

  function salvarPacienteForm(e) {
    e.preventDefault();
    const btn = document.getElementById("btn-salvar");
    const originalText = btn.innerHTML;
    
    btn.disabled = true;
    btn.innerHTML = `<svg class="spin" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg> Salvando...`;

    const paciente = {
      id: document.getElementById("f-id").value,
      prontuario_nome: document.getElementById("f-nome").value,
      diagnostico: document.getElementById("f-diag").value,
      dieta: document.getElementById("f-dieta").value,
      desjejum: document.getElementById("f-desjejum").value,
      colacao: document.getElementById("f-colacao").value,
      almoco: document.getElementById("f-almoco").value,
      lanche: document.getElementById("f-lanche").value,
      jantar: document.getElementById("f-jantar").value,
      ceia: document.getElementById("f-ceia").value,
      observacao: document.getElementById("f-obs").value
    };

    if (typeof google !== 'undefined') {
      google.script.run.withSuccessHandler((res) => {
        btn.disabled = false;
        btn.innerHTML = originalText;
        if (res.success) {
          showToast("Paciente salvo com sucesso!");
          closeModal("modal-form");
          onDateChange(); 
        } else {
          showToast("Erro ao salvar: " + res.error, "error");
        }
      }).salvarPaciente(currentDate, paciente);
    } else {
      setTimeout(() => {
        btn.disabled = false;
        btn.innerHTML = originalText;
        showToast("Salvo localmente (modo Dev)!");
        closeModal("modal-form");
      }, 800);
    }
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove("open");
  }

</script>

<style>
@keyframes spin { 100% { transform: rotate(360deg); } }
</style>

</body>
</html>
